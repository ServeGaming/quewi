# Build + deploy the quewi documentation site to GitHub Pages.
#
# Runs on every push to main that touches docs/, mkdocs.yml, or this
# workflow. Workflow_dispatch also exposed so you can rebuild on
# demand (useful if Pages had a transient error).
#
# Local preview while editing:
#   pip install mkdocs-material
#   mkdocs serve
#   open http://127.0.0.1:8000

name: docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs.yml
  workflow_dispatch:

# Required for actions/deploy-pages and the OIDC token it needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight Pages deployment. New pushes cancel older
# in-progress builds — no point deploying yesterday's docs after
# today's commit.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install mkdocs-material pymdown-extensions

      - name: Build site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
