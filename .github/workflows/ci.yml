name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          # Pinned to the version aqtinstall reliably ships, matching the
          # perf/release workflows. 6.11.0 isn't on aqt's mirror yet (it
          # errors with "Failed to locate XML data for Qt version"); local
          # dev tracks 6.11+, but the code needs no post-6.7 APIs.
          version: "6.8.3"
          modules: qtmultimedia qtwebsockets qtpdf

      - name: Install Ninja (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get update && sudo apt-get install -y ninja-build; fi
          if [ "$RUNNER_OS" = "macOS" ]; then brew install ninja; fi
        shell: bash

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      # install-qt-action ships the MSVC build of Qt on Windows, but the
      # runner also has MinGW gcc on PATH. Without the VS environment active,
      # CMake's Ninja generator picks gcc and then fails to link against the
      # MSVC Qt import libs (undefined reference to QIODevice::errorString,
      # etc). Activating the dev environment makes CMake choose cl.exe, which
      # is exactly what the green release workflow does.
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake --preset windows-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake --preset macos-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake --preset linux-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

      - name: Build
        run: cmake --build --preset ${{ runner.os == 'Windows' && 'windows' || runner.os == 'macOS' && 'macos' || 'linux' }}-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

      - name: Test (Debug only)
        if: matrix.build_type == 'Debug'
        # Headless runners have no display server; the smoke tests construct a
        # QApplication, so without the offscreen platform plugin they abort
        # with "no Qt platform plugin could be initialized" (7/9 failed on
        # Linux). offscreen is built into Qt and works on every platform.
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --preset ${{ runner.os == 'Windows' && 'windows' || runner.os == 'macOS' && 'macos' || 'linux' }}-debug

  # AddressSanitizer + UndefinedBehaviorSanitizer gate. This is the durable
  # answer to "no crashes for 1.0": every use-after-free / out-of-bounds /
  # divide-by-zero the 1.0 audit found by hand would have failed this job
  # automatically. Runs the unit tests AND the app self-test instrumented.
  sanitizers:
    name: ASan + UBSan / Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          modules: qtmultimedia qtwebsockets qtpdf

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure (ASan + UBSan)
        run: cmake --preset linux-asan

      - name: Build
        run: cmake --build --preset linux-asan

      - name: Unit tests under sanitizers
        env:
          QT_QPA_PLATFORM: offscreen
          ASAN_OPTIONS: "detect_leaks=0:abort_on_error=1:detect_stack_use_after_return=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
        run: ctest --preset linux-asan --output-on-failure

      - name: App self-test under sanitizers
        env:
          QT_QPA_PLATFORM: offscreen
          ASAN_OPTIONS: "detect_leaks=0:abort_on_error=1:detect_stack_use_after_return=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
        run: |
          BIN=$(find build/linux-asan -maxdepth 3 -type f -name quewi -perm -u+x | head -1)
          echo "self-test binary: $BIN"
          "$BIN" --selftest

  # ThreadSanitizer for the audio-callback vs GUI-thread races. Informational
  # (continue-on-error) until the inevitable Qt-backend noise is suppressed —
  # it reports without blocking the merge.
  thread-sanitizer:
    name: TSan / Linux (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          modules: qtmultimedia qtwebsockets qtpdf

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure (TSan)
        run: cmake --preset linux-tsan

      - name: Build
        run: cmake --build --preset linux-tsan

      - name: App self-test under TSan
        env:
          QT_QPA_PLATFORM: offscreen
          # suppressions filters out PulseAudio/Qt audio-backend internal races
          # (third-party, not ours) so a non-zero exit means a race in OUR code.
          TSAN_OPTIONS: "halt_on_error=0:second_deadlock_stack=1:suppressions=${{ github.workspace }}/tsan-suppressions.txt"
        run: |
          BIN=$(find build/linux-tsan -maxdepth 3 -type f -name quewi -perm -u+x | head -1)
          echo "self-test binary: $BIN"
          "$BIN" --selftest
