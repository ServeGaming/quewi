# Release pipeline. Triggered when a tag matching v* is pushed
# (e.g. v0.1.0). Builds a Release binary, runs windeployqt, packages an
# MSI via CPack/WiX, and attaches the .msi to a GitHub Release for that
# tag. Manual dispatch is also supported for dry runs against a branch.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (release runs use the pushed tag automatically)"
        required: false

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  build-msi:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: "qtmultimedia qtwebsockets qtpdf"
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # WiX 3.x is what CPack's WIX generator drives. Available
      # pre-installed on windows-2022 runners under
      # C:\Program Files (x86)\WiX Toolset v3.14\bin, but we add it to
      # PATH explicitly to be defensive.
      - name: Locate WiX
        shell: pwsh
        run: |
          $wix = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" -Directory `
            | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $wix) {
            Write-Error "WiX Toolset not found on the runner image."
            exit 1
          }
          Add-Content $env:GITHUB_PATH "$($wix.FullName)\bin"
          Write-Output "Using WiX at $($wix.FullName)\bin"

      - name: Configure (Release)
        shell: cmd
        run: cmake --preset windows-release

      - name: Build
        shell: cmd
        run: cmake --build --preset windows-release

      - name: Tests
        shell: cmd
        run: ctest --preset windows-debug --output-on-failure
        # Tests are configured against the debug preset; they're cheap
        # enough that we configure+build them too.
        continue-on-error: true

      - name: Stage install
        shell: cmd
        run: cmake --install build/windows-release --prefix build/windows-release/_install

      - name: Package MSI
        shell: cmd
        working-directory: build/windows-release
        run: cpack -G WIX --config CPackConfig.cmake

      # Portable ZIP — same staged install tree the MSI wraps, just
      # zipped. Users who want one-click in-app updates extract this
      # to a writable folder and run quewi.exe directly. The in-app
      # updater detects the writable install dir and swaps files in
      # place on update (see docs/in-app-updater.md).
      - name: Package portable ZIP
        shell: pwsh
        working-directory: build/windows-release
        run: |
          # Get the project version from the build's CPackConfig so the
          # ZIP name matches the MSI naming convention.
          $cfg = Get-Content CPackConfig.cmake -Raw
          if ($cfg -match 'CPACK_PACKAGE_VERSION\s+"([^"]+)"') {
            $ver = $matches[1]
          } else {
            $ver = "unknown"
          }
          $zipName = "quewi-$ver-win64-portable.zip"
          # _install/bin holds quewi.exe + all the Qt/FFmpeg DLLs
          # windeployqt copied in. ZIP the whole bin folder so users
          # extracting it get a single self-contained directory.
          $stageDir = Join-Path (Get-Location) "_portable_stage"
          if (Test-Path $stageDir) { Remove-Item -Recurse -Force $stageDir }
          New-Item -ItemType Directory -Path "$stageDir/quewi" | Out-Null
          Copy-Item -Recurse "_install/bin/*" "$stageDir/quewi/"
          Compress-Archive -Path "$stageDir/quewi" -DestinationPath $zipName -Force
          Remove-Item -Recurse -Force $stageDir
          Get-ChildItem $zipName

      - name: Show artifacts
        shell: pwsh
        run: Get-ChildItem build/windows-release -Include *.msi,*.zip -Recurse

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quewi-windows
          path: |
            build/windows-release/*.msi
            build/windows-release/*.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/windows-release/*.msi
            build/windows-release/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}

  build-dmg:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: mac
          target: desktop
          modules: "qtmultimedia qtwebsockets qtpdf"
          cache: true

      - name: Install Ninja
        run: brew install ninja

      # Generate the .icns app icon from the 1024px source PNG so the
      # bundle has a real native icon instead of Qt's generic one.
      # sips + iconutil are Apple-bundled, no extra install.
      - name: Generate .icns app icon
        run: |
          set -e
          SRC="resources/icons/quewi-1024.png"
          if [ ! -f "$SRC" ]; then SRC="resources/icons/quewi.png"; fi
          ICONSET="$(mktemp -d)/quewi.iconset"
          mkdir -p "$ICONSET"
          for px in 16 32 128 256 512; do
            sips -z $px $px "$SRC" --out "$ICONSET/icon_${px}x${px}.png" >/dev/null
            sips -z $((px*2)) $((px*2)) "$SRC" --out "$ICONSET/icon_${px}x${px}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o resources/icons/quewi.icns
          ls -la resources/icons/quewi.icns

      - name: Configure (Release)
        run: cmake --preset macos-release

      - name: Build
        run: cmake --build --preset macos-release

      # Sanity-check that we genuinely built a universal binary.
      # The preset sets CMAKE_OSX_ARCHITECTURES=arm64;x86_64; if any
      # of our deps disagreed (RtMidi built single-arch, FFmpeg only
      # arm64, etc.) the final Mach-O might silently end up single-
      # arch and Intel Macs would refuse to launch with 'not
      # supported on this Mac'. lipo -archs makes the breakage
      # loud at build time rather than at user-launch time.
      - name: Verify universal binary
        run: |
          set -e
          EXEC="build/macos-release/src/app/quewi.app/Contents/MacOS/quewi"
          if [ ! -f "$EXEC" ]; then
            echo "::error::Built executable not found at $EXEC"
            ls -R build/macos-release/src/app/ | head -40
            exit 1
          fi
          ARCHS=$(lipo -archs "$EXEC")
          echo "Built archs: $ARCHS"
          if [[ "$ARCHS" != *"arm64"* ]] || [[ "$ARCHS" != *"x86_64"* ]]; then
            echo "::error::Expected universal (arm64 + x86_64), got: $ARCHS"
            exit 1
          fi

      # Strip SQL drivers we don't ship so macdeployqt — which runs as
      # part of the install step's install(CODE) block — doesn't try
      # to bundle them. Qt's mac builds include sqldrivers for Mimer,
      # iODBC, ODBC, MySQL, and PostgreSQL — most depend on third-party
      # runtime dylibs (libmimerapi, libiodbc, libpq) that aren't on
      # the GitHub macos-14 runner. Without this step macdeployqt
      # aborts with:
      #   ERROR: no file at "/usr/local/lib/libmimerapi.dylib"
      #   ERROR: no file at "/Applications/Postgres.app/.../libpq.5.dylib"
      # leaving the staging dir half-populated, and hdiutil then fails
      # with "Resource busy". Quewi only uses SQLite (see ShowFile.cpp's
      # QSQLITE driver), so the rest are pure dead weight.
      #
      # We prune AFTER configure + build so Qt's CMake imports
      # (Qt6QMimerSQLDriverPluginTargets.cmake et al.) don't trip
      # on the missing files during find_package — they only check
      # file existence at configure time, not at install time.
      - name: Prune unused Qt SQL drivers (post-build, pre-install)
        run: |
          set -e
          QT_ROOT="${QT_ROOT_DIR:-${Qt6_DIR:-${QT_DIR:-}}}"
          if [ -z "$QT_ROOT" ]; then
            QMAKE="$(find /Users/runner/work -type f -name qmake \
                       -path '*/Qt/*/bin/qmake' 2>/dev/null | head -n 1)"
            QT_ROOT="$(dirname "$(dirname "$QMAKE")")"
          fi
          PLUGINS="$QT_ROOT/plugins/sqldrivers"
          echo "Pruning SQL drivers from: $PLUGINS"
          ls "$PLUGINS" || true
          for drv in libqsqlmimer.dylib libqsqlodbc.dylib libqsqlpsql.dylib \
                     libqsqlmysql.dylib libqsqlibase.dylib libqsqloci.dylib; do
            rm -f "$PLUGINS/$drv"
          done
          echo "After prune:"
          ls "$PLUGINS"

      - name: Stage install
        run: cmake --install build/macos-release --prefix build/macos-release/_install

      # ─────────────────────────────────────────────────────────────
      #   macOS signing + notarization
      # ─────────────────────────────────────────────────────────────
      # Two paths:
      #
      # 1. When the repo has MACOS_CERT_P12_BASE64 set (i.e. a real
      #    Apple Developer ID is configured), import the cert into
      #    a temporary keychain, sign with the Developer ID + the
      #    hardened runtime + our entitlements plist, submit the
      #    notarization to Apple, wait for it, and staple the
      #    notarization ticket onto the bundle. The result opens on
      #    any Mac with no Gatekeeper warning at all.
      #
      # 2. Otherwise fall back to ad-hoc signing. The bundle still
      #    builds; users have to right-click → Open + maybe run the
      #    bundled "Fix Gatekeeper.command" first.
      #
      # The "if real cert" check uses an empty-string test on the
      # secret value passed via env — that's the supported pattern
      # for "step gated on whether a secret exists" in GitHub
      # Actions (`if:` can't read secrets directly).
      - name: Set up signing keychain
        id: keychain
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD:   ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12_BASE64" ]; then
            echo "No signing cert configured — falling back to ad-hoc."
            echo "has_cert=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASS="ci-temp-$RANDOM-$RANDOM"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain    -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
                          -P "$MACOS_CERT_PASSWORD" \
                          -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
                          -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH" >/dev/null
          # Make this the FIRST keychain in the search list so
          # codesign finds the imported identity. The login keychain
          # stays available for everything else.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
                                      $(security list-keychains -d user | xargs)

          # Auto-detect the Developer ID Application identity — saves
          # the user having to also paste the cert's common name as a
          # separate secret.
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
                    | grep "Developer ID Application" | head -1 \
                    | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::Imported a cert but no 'Developer ID Application' identity in it."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "Using identity: $IDENTITY"
          echo "has_cert=true"            >> "$GITHUB_OUTPUT"
          echo "identity=$IDENTITY"       >> "$GITHUB_OUTPUT"
          echo "keychain=$KEYCHAIN_PATH"  >> "$GITHUB_OUTPUT"
          rm -f "$CERT_PATH"

      - name: Codesign .app bundle (Developer ID + hardened runtime)
        if: steps.keychain.outputs.has_cert == 'true'
        run: |
          APP="build/macos-release/_install/quewi.app"
          ENTITLEMENTS="resources/macos/entitlements.plist"
          IDENTITY="${{ steps.keychain.outputs.identity }}"

          if [ ! -d "$APP" ]; then
            echo "::error::Expected .app bundle not present at $APP"
            exit 1
          fi

          echo "Stripping pre-existing extended attributes..."
          xattr -cr "$APP"

          # --deep walks every nested framework, plugin, and dylib;
          # --options runtime opts into the hardened runtime which
          # notarization REQUIRES; --entitlements grants only the
          # capabilities quewi actually needs (see the plist).
          # --timestamp asks Apple's TSA for a signed timestamp,
          # which is also required for notarization.
          codesign --force --deep \
                   --options runtime \
                   --entitlements "$ENTITLEMENTS" \
                   --timestamp \
                   --sign "$IDENTITY" \
                   "$APP"

          echo "Verifying signature..."
          codesign --verify --strict --verbose=2 "$APP"
          codesign --display --verbose=2 "$APP" 2>&1 | head -20

      - name: Codesign .app bundle (ad-hoc fallback)
        if: steps.keychain.outputs.has_cert != 'true'
        run: |
          APP="build/macos-release/_install/quewi.app"
          if [ ! -d "$APP" ]; then
            echo "::error::Expected .app bundle not present at $APP"
            ls -la build/macos-release/_install || true
            exit 1
          fi
          echo "Stripping extended attributes..."
          xattr -cr "$APP"
          if codesign --force --sign - "$APP"; then
            codesign --verify --verbose=2 "$APP" || true
          else
            echo "::warning::codesign failed — bundled 'Fix Gatekeeper.command' will be the recovery path"
          fi
          xattr -cr "$APP"

      - name: Package DMG
        working-directory: build/macos-release
        run: cpack -G DragNDrop --config CPackConfig.cmake

      - name: Sign DMG (Developer ID)
        if: steps.keychain.outputs.has_cert == 'true'
        run: |
          DMG=$(ls build/macos-release/*.dmg | head -1)
          IDENTITY="${{ steps.keychain.outputs.identity }}"
          echo "Signing $DMG with $IDENTITY"
          codesign --force --sign "$IDENTITY" --timestamp "$DMG"
          codesign --verify --verbose=2 "$DMG"

      - name: Notarize DMG
        if: steps.keychain.outputs.has_cert == 'true'
        env:
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "::warning::Notarization secrets missing — DMG is signed but not notarized."
            echo "Users will see 'unidentified developer' instead of seamless open."
            exit 0
          fi
          DMG=$(ls build/macos-release/*.dmg | head -1)
          echo "Submitting $DMG to notarytool — this takes ~2-10 minutes..."
          # --wait blocks until Apple finishes the scan (or fails).
          # Without --wait we'd have to poll separately. The verbose
          # log on failure helps diagnose missing entitlements or
          # signature issues.
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id  "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait \
            --output-format json | tee notarize.json
          STATUS=$(jq -r '.status' notarize.json)
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization status: $STATUS"
            # Pull the detailed log so we can see WHY it rejected.
            SUBMISSION_ID=$(jq -r '.id' notarize.json)
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id  "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            exit 1
          fi

      - name: Staple notarization ticket to DMG
        if: steps.keychain.outputs.has_cert == 'true'
        run: |
          DMG=$(ls build/macos-release/*.dmg | head -1)
          # Stapling embeds the notarization ticket into the DMG so
          # Gatekeeper can validate it offline. Without stapling, the
          # user's first launch needs internet to phone home to Apple
          # — fine 99% of the time but a hard fail on an air-gapped
          # show server.
          xcrun stapler staple "$DMG" || \
            echo "::warning::Stapling failed — DMG is notarized but the ticket isn't embedded."
          xcrun stapler validate "$DMG" || true

      - name: Show artifacts
        run: ls -la build/macos-release/*.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: quewi-macos-dmg
          path: build/macos-release/*.dmg
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/macos-release/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}

  build-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev \
            libxkbcommon-dev libfontconfig1 libfuse2 imagemagick

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: linux
          target: desktop
          modules: "qtmultimedia qtwebsockets qtpdf"
          cache: true

      - name: Configure (Release)
        run: cmake --preset linux-release

      - name: Build
        run: cmake --build --preset linux-release

      - name: Stage AppDir
        run: |
          cmake --install build/linux-release \
            --prefix build/linux-release/AppDir/usr
          # The source quewi.png is 1024×1024, but the install drops it
          # into hicolor/512x512/apps/. linuxdeploy validates that the
          # actual pixel size matches the directory name and aborts
          # otherwise. Resize in place so the file IS 512×512.
          ICON_PATH="build/linux-release/AppDir/usr/share/icons/hicolor/512x512/apps/quewi.png"
          if [ -f "$ICON_PATH" ]; then
            convert "$ICON_PATH" -resize 512x512 "$ICON_PATH"
            identify "$ICON_PATH"
          fi

      - name: Fetch linuxdeploy + Qt plugin
        run: |
          curl -L -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o linuxdeploy-plugin-qt \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt

      - name: Build AppImage
        # install-qt-action's variable name has churned across major
        # versions: v2 set $Qt6_DIR, v3+ set $QT_ROOT_DIR (and may
        # also set $Qt6_DIR depending on phase). Trying multiple
        # candidates and falling back to a filesystem search means
        # this step survives the next rename without another fix
        # commit. Last-resort find scopes to the runner workspace
        # so it isn't slow.
        run: |
          QT_ROOT="${QT_ROOT_DIR:-${Qt6_DIR:-${QT_DIR:-}}}"
          if [ -n "$QT_ROOT" ] && [ -x "$QT_ROOT/bin/qmake" ]; then
            export QMAKE="$QT_ROOT/bin/qmake"
          else
            echo "QT_ROOT_DIR/Qt6_DIR/QT_DIR all empty or qmake missing,"
            echo "falling back to filesystem search."
            export QMAKE="$(find /home/runner/work -type f -name qmake \
                            -path '*/Qt/*/bin/qmake' 2>/dev/null \
                            | head -n 1)"
          fi
          if [ -z "$QMAKE" ] || [ ! -x "$QMAKE" ]; then
            echo "::error::qmake could not be located. Searched env vars + filesystem."
            env | grep -iE 'qt|qmake' || true
            exit 1
          fi
          echo "Using QMAKE=$QMAKE"

          # Prune SQL driver plugins we don't use. linuxdeploy-plugin-qt
          # bundles every plugin in plugins/sqldrivers/ by default and
          # chokes on libqsqlmimer.so because the proprietary Mimer
          # runtime (libmimerapi.so) isn't installed on the GitHub
          # runner. Quewi only uses SQLite (see ShowFile.cpp:
          # QSQLITE), so the rest are dead weight even when they'd
          # link cleanly. Same logic for the Oracle / DB2 / PSQL
          # drivers — kept for future-proofing in case those become
          # an issue on a future aqtinstall image.
          QT_PLUGINS_DIR="$(dirname "$QMAKE")/../plugins"
          for drv in libqsqlmimer.so libqsqlodbc.so libqsqlpsql.so \
                     libqsqloci.so libqsqlibase.so; do
            rm -f "$QT_PLUGINS_DIR/sqldrivers/$drv"
          done
          ls "$QT_PLUGINS_DIR/sqldrivers/" || true

          export VERSION="${GITHUB_REF_NAME#v}"
          export OUTPUT="quewi-${VERSION}-linux-x86_64.AppImage"
          ./linuxdeploy \
            --appdir build/linux-release/AppDir \
            --plugin qt \
            --output appimage \
            --desktop-file build/linux-release/AppDir/usr/share/applications/quewi.desktop \
            --icon-file build/linux-release/AppDir/usr/share/icons/hicolor/512x512/apps/quewi.png

      - name: Show artifacts
        run: ls -la *.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: quewi-linux-appimage
          path: "*.AppImage"
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.AppImage"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
